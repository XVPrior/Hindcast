# Fly.io config — single-machine deploy.
#
# Both the FastAPI dashboard backend and the live-engine worker run
# inside ONE Python process (worker spawned as a daemon thread by the
# FastAPI lifespan when ENABLE_WORKER=true). They share the same
# in-process DuckDB connection pool, which avoids the cross-machine
# volume-sharing limitation Fly imposes.

app = "hindcast"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[[mounts]]
  source = "hindcast_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  # Worker needs the machine to stay alive — don't auto-stop.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"   # Worker startup adds a few seconds
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[env]
  CORS_ALLOW_ORIGINS = "https://hindcast.pages.dev"
  ENABLE_WORKER = "true"
  DB_PATH = "/data/hindcast.duckdb"

[[vm]]
  memory = "512mb"   # API + 5 engines need a bit of headroom over 256MB
  cpu_kind = "shared"
  cpus = 1
