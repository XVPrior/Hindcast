# Fly.io config — adjust `app` and `primary_region` after `fly launch`.
#
# Deployment flow:
#   1. cd research && uv run python scripts/build_demo_db.py
#   2. flyctl launch --copy-config --no-deploy   # first time only; picks app name + region
#   3. flyctl deploy

app = "hindcast"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  # Free-tier friendly: machine sleeps when idle, wakes on first request.
  # Cold-start adds ~2s latency on the first hit after idle.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[env]
  # Tighten this after the Cloudflare Pages URL is provisioned, e.g.:
  #   flyctl secrets set CORS_ALLOW_ORIGINS="https://hindcast.pages.dev"
  CORS_ALLOW_ORIGINS = "*"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
